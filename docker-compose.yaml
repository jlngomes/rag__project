services:
  postgres:
    image: postgres:15
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio-init:
    image: python:3.11-slim
    container_name: minio-init
    working_dir: /app
    depends_on:
      minio:
        condition: service_started
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_ENDPOINT: minio:9000
    command: sh -c "pip install minio && python scripts/init_minio.py"
    volumes:
      - ./scripts:/app/scripts

  mlflow:
    image: python:3.11-slim
    container_name: mlflow
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      minio-init:
        condition: service_completed_successfully
      postgres:
        condition: service_started
    environment:
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    command: sh -c "pip install mlflow psycopg2-binary boto3 && mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri postgresql://postgres:password@postgres:5432/db --default-artifact-root s3://mlflow-artifacts --allowed-hosts mlflow,mlflow:5000,localhost,localhost:5000"

  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  ingest:
    build:
      context: .
      dockerfile: Dockerfile.ingest
    depends_on:
      minio-init:
        condition: service_completed_successfully
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_ENDPOINT: minio:9000
      KAGGLE_API_TOKEN: ${KAGGLE_API_TOKEN}
    env_file:
      - .env

  transform_silver:
    build:
      context: .
      dockerfile: Dockerfile.transform_silver
    depends_on:
      ingest:
        condition: service_completed_successfully
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_ENDPOINT: minio:9000
    command: python scripts/bronze_to_silver.py

  transform_gold:
    build:
      context: .
      dockerfile: Dockerfile.transform_silver
    depends_on:
      transform_silver:
        condition: service_completed_successfully
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_ENDPOINT: minio:9000
    command: python scripts/silver_to_gold.py

  model_training:
    build:
      context: .
      dockerfile: Dockerfile.transform_silver
    depends_on:
      transform_gold:
        condition: service_completed_successfully
      mlflow:
        condition: service_started
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_ENDPOINT: minio:9000
      MLFLOW_TRACKING_URI: http://mlflow:5000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    command: python scripts/train_model.py

  model_training_bomb:
    build:
      context: .
      dockerfile: Dockerfile.transform_silver
    depends_on:
      transform_gold:
        condition: service_completed_successfully
      mlflow:
        condition: service_started
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_ENDPOINT: minio:9000
      MLFLOW_TRACKING_URI: http://mlflow:5000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    command: python scripts/train_bomb_model.py

  # ----------------- SPRINT 5 ----------------- #
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: milvus-etcd
    restart: unless-stopped
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:  
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd

  milvus:
    image: milvusdb/milvus:v2.3.5
    container_name: milvus-standalone
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: minioadmin
      MINIO_SECRET_ACCESS_KEY: minioadmin
      MINIO_BUCKET_NAME: milvus-bucket
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - etcd
      - minio
      - milvus-bucket-init
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  milvus-bucket-init:
    image: minio/mc:latest
    container_name: milvus-bucket-init
    depends_on:
      minio:
        condition: service_started
    entrypoint: /bin/sh
    command: |
      -c "
      echo 'Aguardando MinIO...';
      sleep 5;
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/milvus-bucket --ignore-existing;
      echo 'Bucket milvus-bucket criado/verificado';
      "

  ollama:
    image: ollama/ollama:0.3.14
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0

  ollama-setup:
    image: curlimages/curl:latest
    container_name: ollama-setup
    depends_on:
    - ollama
    entrypoint: ["sh", "-c"]
    command:
      - |
        echo '=== Aguardando Ollama inicializar ===' &&
        sleep 15 &&
        until curl -sf http://ollama:11434/api/tags > /dev/null; do
          echo 'Aguardando...' && sleep 5
        done &&
        echo '=== Baixando nomic-embed-text ===' &&
        curl -X POST http://ollama:11434/api/pull -H 'Content-Type: application/json' -d '{"name":"nomic-embed-text"}' --max-time 300 &&
        echo '=== Baixando llama3.2 ===' &&
        curl -X POST http://ollama:11434/api/pull -H 'Content-Type: application/json' -d '{"name":"llama3.2"}' --max-time 600 &&
        echo '=== Modelos prontos ==='

  embedding_pipeline:
    build:
      context: .
      dockerfile: Dockerfile.embedding
    container_name: embedding-pipeline
    depends_on:
      ollama-setup:
        condition: service_completed_successfully
      milvus:
        condition: service_healthy
      transform_gold:
        condition: service_completed_successfully
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_ENDPOINT: minio:9000
      MILVUS_URI: http://milvus:19530
      OLLAMA_BASE_URL: http://ollama:11434
    restart: "no"

volumes:
  postgres_data:
  minio_data:
  mlflow_data:
  etcd_data:
  milvus_data:
  ollama_data: